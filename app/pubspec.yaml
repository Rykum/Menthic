name: menthic
description: "Project Oracle — Menthic: UI Flutter."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  oracle_engine:
    path: ../engine
  oracle_store:
    path: ../store
  oracle_calibration:
    path: ../calibration
  oracle_learning:
    path: ../learning

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/textures/
    - assets/img/
